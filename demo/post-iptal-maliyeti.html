<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
    <link rel="icon" href="../app/icon.svg" type="image/svg+xml">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seansify — İptal Maliyeti</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a1a;
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    padding: 40px 20px;
  }
  .label { color: #475569; font-size: 13px; }

  /* ── Ana kare ── */
  #post {
    width: 540px;
    height: 540px;
    position: relative;
    overflow: hidden;
    background-color: #eaf4f0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
  }

  /* ── Nokta dekorasyonları — DOM circle elementleri ── */
  .dot {
    position: absolute;
    border-radius: 50%;
    background-color: #b2d8cc;
    pointer-events: none;
  }

  /* ── Merkezi daire halkası — DOM div, border ile ── */
  .center-ring {
    position: absolute;
    width: 340px;
    height: 340px;
    border-radius: 50%;
    border: 1px solid #c8e6de;
    background-color: transparent;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }

  /* ── İçerik ── */
  .content {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 0 48px;
    gap: 0;
  }

  .tag {
    color: #4a7c6f;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  .big-number {
    font-size: 100px;
    font-weight: 900;
    color: #0d1f18;
    line-height: 1;
    letter-spacing: -0.04em;
    margin-bottom: 0;
  }

  .big-unit {
    font-size: 22px;
    font-weight: 700;
    color: #4a7c6f;
    margin-bottom: 6px;
    margin-top: 2px;
  }

  .subtitle {
    font-size: 20px;
    font-weight: 700;
    color: #0d1f18;
    margin-bottom: 16px;
  }

  /* Divider — DOM div */
  .divider {
    width: 32px;
    height: 2px;
    background-color: #4a7c6f;
    border-radius: 2px;
    margin-bottom: 18px;
    opacity: 0.5;
  }

  .body-text {
    font-size: 13.5px;
    color: #2d5a4e;
    line-height: 1.7;
    max-width: 360px;
  }
  .body-text b {
    color: #0d1f18;
    font-weight: 700;
  }

  /* ── Alt logo ── */
  .bottom-logo {
    position: absolute;
    bottom: 24px;
    left: 0; right: 0;
    z-index: 3;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .logo-dot {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background-color: #4a7c6f;
  }
  .logo-text {
    color: #4a7c6f;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }

  /* ── İndir butonu ── */
  .btn-download {
    background: #4a7c6f;
    color: #f8fafc;
    border: none;
    padding: 12px 36px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.03em;
    transition: background 0.2s;
  }
  .btn-download:hover { background: #0d1f18; color: #6ee7b7; }
</style>
</head>
<body>

<div class="label">540×540px — "İndir" ile 1080×1080px PNG</div>

<div id="post">
  <!-- Dağınık nokta dekorasyonları -->
  <div class="dot" style="width:5px;height:5px;top:72px;left:88px;opacity:0.5;"></div>
  <div class="dot" style="width:4px;height:4px;top:110px;right:100px;opacity:0.4;"></div>
  <div class="dot" style="width:6px;height:6px;top:180px;left:52px;opacity:0.35;"></div>
  <div class="dot" style="width:4px;height:4px;top:200px;right:56px;opacity:0.45;"></div>
  <div class="dot" style="width:5px;height:5px;bottom:160px;left:72px;opacity:0.4;"></div>
  <div class="dot" style="width:4px;height:4px;bottom:180px;right:80px;opacity:0.35;"></div>
  <div class="dot" style="width:6px;height:6px;bottom:90px;left:110px;opacity:0.3;"></div>
  <div class="dot" style="width:4px;height:4px;bottom:100px;right:120px;opacity:0.3;"></div>
  <div class="dot" style="width:3px;height:3px;top:300px;left:30px;opacity:0.3;"></div>
  <div class="dot" style="width:3px;height:3px;top:260px;right:32px;opacity:0.3;"></div>

  <!-- Merkezi daire halkası -->
  <div class="center-ring"></div>

  <!-- İçerik -->
  <div class="content">
    <div class="tag">Psikolog Notları</div>

    <div class="big-number">3</div>
    <div class="big-unit">saat / ay</div>

    <div class="subtitle">Takvimde görünmeyen kayıp.</div>

    <div class="divider"></div>

    <div class="body-text">
      Haftada 2 iptal × 20 dakika yazışma ve yeniden planlama.<br>
      Kimse saymıyor çünkü takvimde gözükmüyor.<br>
      <b>Vermezseniz danışan endişeleniyor.</b>
    </div>
  </div>

  <!-- Alt logo -->
  <div class="bottom-logo">
    <div class="logo-dot"></div>
    <span class="logo-text">Seansify</span>
    <div class="logo-dot"></div>
  </div>
</div>

<button class="btn-download" onclick="indir()">İndir — 1080×1080px PNG</button>

<script>
async function indir() {
  const el = document.getElementById('post')
  const canvas = await html2canvas(el, {
    scale: 2,
    useCORS: true,
    allowTaint: true,
    backgroundColor: '#eaf4f0',
    logging: false,
    width: 540,
    height: 540,
  })
  const link = document.createElement('a')
  link.download = 'seansify-iptal-maliyeti.png'
  link.href = canvas.toDataURL('image/png')
  link.click()
}
</script>

</body>
</html>
