<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
    <link rel="icon" href="../app/icon.svg" type="image/svg+xml">
  <title>Seansify — Profil Resmi İndir</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #111827;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 28px;
      font-family: Inter, sans-serif;
    }
    canvas {
      border-radius: 50%;
      width: 360px;
      height: 360px;
    }
    button {
      background: #4a7c6f;
      color: white;
      border: none;
      padding: 14px 36px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      font-family: Inter, sans-serif;
      transition: background 0.2s;
    }
    button:hover { background: #3d6b5f; }
    p { color: #64748b; font-size: 13px; }
  </style>
</head>
<body>
  <canvas id="c" width="1000" height="1000"></canvas>
  <button onclick="download()">PNG İndir (1000×1000)</button>
  <p>Instagram profil resmi olarak kullanmaya hazır.</p>

  <script>
    const canvas = document.getElementById('c')
    const ctx = canvas.getContext('2d')

    // Font yüklenince çiz
    document.fonts.ready.then(() => draw())

    function draw() {
      const W = 1000, R = 500
      ctx.clearRect(0, 0, W, W)

      // ── Arka plan dairesi ──────────────────────────
      ctx.save()
      ctx.beginPath()
      ctx.arc(R, R, R, 0, Math.PI * 2)
      const grad = ctx.createRadialGradient(380, 320, 0, R, R, R)
      grad.addColorStop(0, '#1a3d33')
      grad.addColorStop(1, '#060f0c')
      ctx.fillStyle = grad
      ctx.fill()
      ctx.clip()

      // ── Takvim ikonu ───────────────────────────────
      // Orijinal viewBox 40x40, içerik x:6-34 y:7-35
      // scale=11 → ikon 308x308 → ortala: tx=500-(20*11)=280, ty=170-(21*11)=...
      const s = 11
      const tx = 500 - 20 * s   // 280
      const ty = 330 - 21 * s   // ikonu aşağı al

      function px(x) { return tx + x * s }
      function py(y) { return ty + y * s }

      // Gövde
      rrect(px(6), py(11), 28*s, 24*s, 3*s, '#ffffff')
      // Sol çengel
      rrect(px(13), py(7), 3*s, 8*s, 1.5*s, '#ffffff')
      // Sağ çengel
      rrect(px(24), py(7), 3*s, 8*s, 1.5*s, '#ffffff')
      // Orta daire
      ctx.beginPath()
      ctx.arc(px(20), py(25), 4.5*s, 0, Math.PI*2)
      ctx.fillStyle = '#4a7c6f'
      ctx.fill()

      ctx.restore()

      // ── "seansify" yazısı ─────────────────────────
      const fontSize = 130
      ctx.font = `900 ${fontSize}px Inter, -apple-system, sans-serif`
      ctx.textBaseline = 'alphabetic'
      ctx.textAlign = 'left'

      const w1 = ctx.measureText('seans').width
      const w2 = ctx.measureText('ify').width
      const startX = R - (w1 + w2) / 2
      const textY = 740

      ctx.fillStyle = '#6ee7b7'
      ctx.fillText('seans', startX, textY)

      ctx.fillStyle = '#ffffff'
      ctx.fillText('ify', startX + w1, textY)
    }

    function rrect(x, y, w, h, r, color) {
      ctx.beginPath()
      ctx.moveTo(x + r, y)
      ctx.arcTo(x + w, y,     x + w, y + h, r)
      ctx.arcTo(x + w, y + h, x,     y + h, r)
      ctx.arcTo(x,     y + h, x,     y,     r)
      ctx.arcTo(x,     y,     x + w, y,     r)
      ctx.closePath()
      ctx.fillStyle = color
      ctx.fill()
    }

    function download() {
      const link = document.createElement('a')
      link.download = 'seansify-profil.png'
      link.href = canvas.toDataURL('image/png')
      link.click()
    }
  </script>
</body>
</html>
