<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    font-family: -apple-system, 'SF Pro Display', 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0d1f18 0%, #1a3a2e 60%, #0f2a20 100%);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    position: relative;
  }

  /* Subtle grid texture */
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(74,124,111,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(74,124,111,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
  }

  /* Glow blob */
  .glow {
    position: absolute;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(74,124,111,0.18) 0%, transparent 70%);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }

  /* WhatsApp icon — top right */
  .wa-icon {
    position: absolute;
    top: 72px;
    right: 72px;
    width: 64px;
    height: 64px;
    background: rgba(37, 211, 102, 0.12);
    border: 1px solid rgba(37, 211, 102, 0.25);
    border-radius: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Decorative corner lines */
  .corner-tl, .corner-br {
    position: absolute;
    width: 80px;
    height: 80px;
  }
  .corner-tl {
    top: 48px;
    left: 48px;
    border-top: 1.5px solid rgba(74,124,111,0.35);
    border-left: 1.5px solid rgba(74,124,111,0.35);
    border-radius: 4px 0 0 0;
  }
  .corner-br {
    bottom: 48px;
    right: 48px;
    border-bottom: 1.5px solid rgba(74,124,111,0.35);
    border-right: 1.5px solid rgba(74,124,111,0.35);
    border-radius: 0 0 4px 0;
  }

  /* Main content */
  .content {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: 0 120px;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(74,124,111,0.15);
    border: 1px solid rgba(74,124,111,0.3);
    border-radius: 100px;
    padding: 10px 22px;
    margin-bottom: 52px;
  }
  .badge-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #6ee7b7;
  }
  .badge span {
    font-size: 15px;
    font-weight: 600;
    color: #6ee7b7;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .main-text {
    font-size: 74px;
    font-weight: 800;
    color: #f8fafc;
    line-height: 1.08;
    letter-spacing: -0.02em;
    margin-bottom: 36px;
  }

  .main-text em {
    font-style: normal;
    background: linear-gradient(90deg, #4a7c6f, #6ee7b7);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .sub-text {
    font-size: 22px;
    color: #64748b;
    line-height: 1.6;
    max-width: 640px;
    margin: 0 auto;
    font-weight: 400;
  }

  .sub-text strong {
    color: #94a3b8;
    font-weight: 500;
  }

  /* Stats row */
  .stats {
    position: absolute;
    bottom: 140px;
    left: 0;
    right: 0;
    display: flex;
    justify-content: center;
    gap: 0;
    z-index: 2;
  }

  .stat {
    padding: 0 52px;
    text-align: center;
    border-right: 1px solid rgba(255,255,255,0.07);
  }
  .stat:last-child { border-right: none; }

  .stat-num {
    font-size: 36px;
    font-weight: 800;
    color: #f8fafc;
    letter-spacing: -0.02em;
  }
  .stat-label {
    font-size: 13px;
    color: #475569;
    margin-top: 4px;
    font-weight: 500;
  }

  /* Bottom bar */
  .bottom-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 88px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 72px;
    border-top: 1px solid rgba(255,255,255,0.05);
    z-index: 2;
  }

  .logo-area {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-box {
    width: 38px;
    height: 38px;
    background: #4a7c6f;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .logo-name {
    font-size: 18px;
    font-weight: 700;
    color: #f8fafc;
    letter-spacing: -0.01em;
  }

  .url {
    font-size: 15px;
    color: #475569;
    font-weight: 500;
    letter-spacing: 0.01em;
  }
</style>
</head>
<body>

  <div class="glow"></div>
  <div class="corner-tl"></div>
  <div class="corner-br"></div>

  <!-- WhatsApp Icon -->
  <div class="wa-icon">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none">
      <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z" fill="#25D366"/>
      <path d="M12 2C6.477 2 2 6.477 2 12c0 1.89.525 3.66 1.438 5.168L2 22l4.832-1.438A9.96 9.96 0 0012 22c5.523 0 10-4.477 10-10S17.523 2 12 2zm0 18a7.96 7.96 0 01-4.073-1.115l-.292-.173-3.028.9.9-3.028-.173-.292A7.96 7.96 0 014 12c0-4.411 3.589-8 8-8s8 3.589 8 8-3.589 8-8 8z" fill="#25D366"/>
    </svg>
  </div>

  <!-- Main Content -->
  <div class="content">
    <div class="badge">
      <div class="badge-dot"></div>
      <span>Yapay Zeka Asistanı</span>
    </div>

    <h1 class="main-text">
      Siz uyurken de<br><em>randevu alınıyor.</em>
    </h1>

    <p class="sub-text">
      Seansify'ın yapay zeka asistanı hasta mesajlarını <strong>7/24</strong> yanıtlar,
      uygun saati önerir ve randevuyu <strong>otomatik oluşturur.</strong>
    </p>
  </div>

  <!-- Stats -->
  <div class="stats">
    <div class="stat">
      <div class="stat-num">7/24</div>
      <div class="stat-label">Kesintisiz aktif</div>
    </div>
    <div class="stat">
      <div class="stat-num">%98</div>
      <div class="stat-label">Başarı oranı</div>
    </div>
    <div class="stat">
      <div class="stat-num">4 saat</div>
      <div class="stat-label">Haftalık kazanım</div>
    </div>
  </div>

  <!-- Bottom Bar -->
  <div class="bottom-bar">
    <div class="logo-area">
      <div class="logo-box">
        <svg width="20" height="20" viewBox="0 0 40 40" fill="none">
          <rect x="6" y="11" width="28" height="24" rx="3" fill="white"/>
          <rect x="13" y="7" width="3" height="8" rx="1.5" fill="white"/>
          <rect x="24" y="7" width="3" height="8" rx="1.5" fill="white"/>
          <circle cx="20" cy="25" r="4" fill="#4a7c6f"/>
          <path d="M13 35C13 31 16 28 20 28C24 28 27 31 27 35" fill="#4a7c6f"/>
        </svg>
      </div>
      <span class="logo-name">Seansify</span>
    </div>
    <span class="url">seansify.com</span>
  </div>

</body>
</html>
