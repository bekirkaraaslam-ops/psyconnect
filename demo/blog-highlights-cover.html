<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
    <link rel="icon" href="../app/icon.svg" type="image/svg+xml">
<title>Instagram Highlights Kapağı — Blog</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #111;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: -apple-system, 'Segoe UI', sans-serif;
    padding: 40px 20px;
    gap: 20px;
  }

  .label {
    color: #888;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 1px;
  }

  /* Hikaye formatı: 540×960 → 1080×1920px */
  .slide {
    width: 540px;
    height: 960px;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* Arka plan */
  .bg-base {
    position: absolute;
    inset: 0;
    background: linear-gradient(160deg, #0d1f18 0%, #1a3d2b 50%, #163324 100%);
  }

  .bg-glow-center {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 500px;
    height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(110,231,183,0.12) 0%, rgba(74,124,111,0.06) 50%, transparent 75%);
  }

  .bg-glow-top {
    position: absolute;
    top: -80px;
    right: -60px;
    width: 320px;
    height: 320px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(110,231,183,0.08) 0%, transparent 70%);
  }

  .bg-glow-bottom {
    position: absolute;
    bottom: -80px;
    left: -60px;
    width: 280px;
    height: 280px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(74,124,111,0.1) 0%, transparent 70%);
  }

  /* Halka dekorasyonları */
  .ring {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    border: 1px solid rgba(110,231,183,0.1);
  }
  .ring-1 { width: 300px; height: 300px; }
  .ring-2 { width: 400px; height: 400px; border-color: rgba(110,231,183,0.06); }
  .ring-3 { width: 500px; height: 500px; border-color: rgba(110,231,183,0.04); }

  /* Nokta ızgarası */
  .dots {
    position: absolute;
    inset: 0;
    opacity: 0.6;
  }

  /* İçerik — dikey merkezde */
  .content {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
    text-align: center;
  }

  /* İkon dairesi */
  .icon-wrap {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    background: linear-gradient(135deg, rgba(110,231,183,0.18) 0%, rgba(74,124,111,0.12) 100%);
    border: 1.5px solid rgba(110,231,183,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 28px;
  }

  .blog-label {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: #f0fdf4;
    margin-top: 4px;
  }

  .sub-label {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: rgba(110,231,183,0.6);
    margin-top: 12px;
  }

  /* Marka */
  .brand {
    position: absolute;
    bottom: 52px;
    left: 0;
    right: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    z-index: 10;
  }

  .brand-dot {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: rgba(110,231,183,0.35);
  }

  .brand-name {
    font-size: 11px;
    font-weight: 600;
    color: rgba(240,253,244,0.2);
    letter-spacing: 2px;
  }

  /* İndir butonu */
  .btn-download {
    padding: 12px 32px;
    background: #4a7c6f;
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
    font-family: inherit;
  }
  .btn-download:hover { opacity: 0.85; }
  .btn-download:disabled { opacity: 0.5; cursor: not-allowed; }
</style>
</head>
<body>

<div class="label">Instagram Highlights Kapağı — Blog (1080×1920px)</div>

<div class="slide" id="slide">
  <div class="bg-base"></div>
  <div class="bg-glow-center"></div>
  <div class="bg-glow-top"></div>
  <div class="bg-glow-bottom"></div>

  <div class="ring ring-1"></div>
  <div class="ring ring-2"></div>
  <div class="ring ring-3"></div>

        <circle cx="54" cy="224" r="1.5"/><circle cx="108" cy="224" r="1.5"/><circle cx="162" cy="224" r="1.5"/><circle cx="216" cy="224" r="1.5"/><circle cx="270" cy="224" r="1.5"/><circle cx="324" cy="224" r="1.5"/><circle cx="378" cy="224" r="1.5"/><circle cx="432" cy="224" r="1.5"/><circle cx="486" cy="224" r="1.5"/>
        <circle cx="54" cy="288" r="1.5"/><circle cx="108" cy="288" r="1.5"/><circle cx="162" cy="288" r="1.5"/><circle cx="216" cy="288" r="1.5"/><circle cx="270" cy="288" r="1.5"/><circle cx="324" cy="288" r="1.5"/><circle cx="378" cy="288" r="1.5"/><circle cx="432" cy="288" r="1.5"/><circle cx="486" cy="288" r="1.5"/>
        <circle cx="54" cy="352" r="1.5"/><circle cx="108" cy="352" r="1.5"/><circle cx="162" cy="352" r="1.5"/><circle cx="216" cy="352" r="1.5"/><circle cx="270" cy="352" r="1.5"/><circle cx="324" cy="352" r="1.5"/><circle cx="378" cy="352" r="1.5"/><circle cx="432" cy="352" r="1.5"/><circle cx="486" cy="352" r="1.5"/>
        <circle cx="54" cy="416" r="1.5"/><circle cx="108" cy="416" r="1.5"/><circle cx="162" cy="416" r="1.5"/><circle cx="216" cy="416" r="1.5"/><circle cx="270" cy="416" r="1.5"/><circle cx="324" cy="416" r="1.5"/><circle cx="378" cy="416" r="1.5"/><circle cx="432" cy="416" r="1.5"/><circle cx="486" cy="416" r="1.5"/>
        <circle cx="54" cy="480" r="1.5"/><circle cx="108" cy="480" r="1.5"/><circle cx="162" cy="480" r="1.5"/><circle cx="216" cy="480" r="1.5"/><circle cx="270" cy="480" r="1.5"/><circle cx="324" cy="480" r="1.5"/><circle cx="378" cy="480" r="1.5"/><circle cx="432" cy="480" r="1.5"/><circle cx="486" cy="480" r="1.5"/>
        <circle cx="54" cy="544" r="1.5"/><circle cx="108" cy="544" r="1.5"/><circle cx="162" cy="544" r="1.5"/><circle cx="216" cy="544" r="1.5"/><circle cx="270" cy="544" r="1.5"/><circle cx="324" cy="544" r="1.5"/><circle cx="378" cy="544" r="1.5"/><circle cx="432" cy="544" r="1.5"/><circle cx="486" cy="544" r="1.5"/>
        <circle cx="54" cy="608" r="1.5"/><circle cx="108" cy="608" r="1.5"/><circle cx="162" cy="608" r="1.5"/><circle cx="216" cy="608" r="1.5"/><circle cx="270" cy="608" r="1.5"/><circle cx="324" cy="608" r="1.5"/><circle cx="378" cy="608" r="1.5"/><circle cx="432" cy="608" r="1.5"/><circle cx="486" cy="608" r="1.5"/>
        <circle cx="54" cy="672" r="1.5"/><circle cx="108" cy="672" r="1.5"/><circle cx="162" cy="672" r="1.5"/><circle cx="216" cy="672" r="1.5"/><circle cx="270" cy="672" r="1.5"/><circle cx="324" cy="672" r="1.5"/><circle cx="378" cy="672" r="1.5"/><circle cx="432" cy="672" r="1.5"/><circle cx="486" cy="672" r="1.5"/>
        <circle cx="54" cy="736" r="1.5"/><circle cx="108" cy="736" r="1.5"/><circle cx="162" cy="736" r="1.5"/><circle cx="216" cy="736" r="1.5"/><circle cx="270" cy="736" r="1.5"/><circle cx="324" cy="736" r="1.5"/><circle cx="378" cy="736" r="1.5"/><circle cx="432" cy="736" r="1.5"/><circle cx="486" cy="736" r="1.5"/>
        <circle cx="54" cy="800" r="1.5"/><circle cx="108" cy="800" r="1.5"/><circle cx="162" cy="800" r="1.5"/><circle cx="216" cy="800" r="1.5"/><circle cx="270" cy="800" r="1.5"/><circle cx="324" cy="800" r="1.5"/><circle cx="378" cy="800" r="1.5"/><circle cx="432" cy="800" r="1.5"/><circle cx="486" cy="800" r="1.5"/>
        <circle cx="54" cy="864" r="1.5"/><circle cx="108" cy="864" r="1.5"/><circle cx="162" cy="864" r="1.5"/><circle cx="216" cy="864" r="1.5"/><circle cx="270" cy="864" r="1.5"/><circle cx="324" cy="864" r="1.5"/><circle cx="378" cy="864" r="1.5"/><circle cx="432" cy="864" r="1.5"/><circle cx="486" cy="864" r="1.5"/>
      </g>
    </svg>
  </div>

  <div class="content">
    <div class="icon-wrap">
      <!-- Kalem + sayfa ikonu -->
      <svg width="52" height="52" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Sayfa -->
        <rect x="10" y="6" width="28" height="36" rx="3" fill="rgba(110,231,183,0.12)" stroke="rgba(110,231,183,0.5)" stroke-width="1.5"/>
        <!-- Satırlar -->
        <line x1="16" y1="17" x2="32" y2="17" stroke="rgba(110,231,183,0.4)" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="16" y1="23" x2="32" y2="23" stroke="rgba(110,231,183,0.4)" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="16" y1="29" x2="26" y2="29" stroke="rgba(110,231,183,0.4)" stroke-width="1.5" stroke-linecap="round"/>
        <!-- Kalem -->
        <rect x="30" y="30" width="8" height="16" rx="1.5" transform="rotate(-45 30 30)" fill="#4a7c6f" stroke="rgba(110,231,183,0.6)" stroke-width="1"/>
        <polygon points="35.5,43 33,46 36,45" fill="#6ee7b7"/>
      </svg>
    </div>

    <div class="blog-label">Blog</div>
    <div class="sub-label">Yazılar & Düşünceler</div>
  </div>

  <div class="brand">
    <div class="brand-dot"></div>
    <div class="brand-name">SEANSIFY</div>
    <div class="brand-dot"></div>
  </div>
</div>

<button class="btn-download" id="btn" onclick="download()">PNG İndir (1080×1920)</button>

<script>
async function download() {
  const btn = document.getElementById('btn');
  btn.disabled = true;
  btn.textContent = 'Hazırlanıyor...';

  const el = document.getElementById('slide');
  const canvas = await html2canvas(el, {
    scale: 2,
    useCORS: true,
    allowTaint: true,
    backgroundColor: '#0d1f18',
    logging: false,
    width: 540,
    height: 960
  });

  const link = document.createElement('a');
  link.download = 'seansify-highlights-blog.png';
  link.href = canvas.toDataURL('image/png');
  link.click();

  btn.disabled = false;
  btn.textContent = 'PNG İndir (1080×1920)';
}
</script>
</body>
</html>
