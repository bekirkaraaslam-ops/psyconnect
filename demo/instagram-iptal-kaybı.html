<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0d1f18 0%, #1a3a2e 100%);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    position: relative;
  }

  /* Dot pattern */
  .dots {
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle, rgba(110,231,183,0.07) 1px, transparent 1px);
    background-size: 36px 36px;
  }

  /* Glow */
  .glow {
    position: absolute;
    width: 600px; height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(74,124,111,0.18) 0%, transparent 70%);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }

  .content {
    position: relative;
    z-index: 1;
    width: 900px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 48px;
  }

  /* Top label */
  .top-label {
    font-size: 18px;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.5px;
    text-align: center;
  }

  /* Big number */
  .big-number {
    text-align: center;
    line-height: 1;
  }

  .big-number .amount {
    font-size: 128px;
    font-weight: 900;
    color: #ffffff;
    letter-spacing: -4px;
    display: block;
  }

  .big-number .sub {
    font-size: 24px;
    font-weight: 600;
    color: #6ee7b7;
    display: block;
    margin-top: 12px;
    letter-spacing: 0.3px;
  }

  /* Calculation card */
  .calc-card {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(110,231,183,0.2);
    border-radius: 24px;
    padding: 36px 48px;
    width: 100%;
    backdrop-filter: blur(8px);
  }

  .calc-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 0;
  }

  .calc-row + .calc-row {
    border-top: 1px solid rgba(255,255,255,0.08);
  }

  .calc-row .label {
    font-size: 20px;
    color: rgba(255,255,255,0.6);
    font-weight: 400;
  }

  .calc-row .value {
    font-size: 22px;
    color: #ffffff;
    font-weight: 700;
  }

  .calc-row.total .label {
    font-size: 22px;
    color: #6ee7b7;
    font-weight: 700;
  }

  .calc-row.total .value {
    font-size: 28px;
    color: #6ee7b7;
    font-weight: 900;
  }

  /* Bottom note */
  .bottom-note {
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(110,231,183,0.1);
    border: 1px solid rgba(110,231,183,0.25);
    border-radius: 100px;
    padding: 12px 24px;
  }

  .bottom-note .dot {
    width: 8px; height: 8px;
    background: #6ee7b7;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .bottom-note span {
    font-size: 16px;
    color: #6ee7b7;
    font-weight: 500;
  }

  /* Footer */
  .footer {
    position: absolute;
    bottom: 36px;
    left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 54px;
    z-index: 1;
  }

  .logo-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-icon {
    width: 32px; height: 32px;
    background: #4a7c6f;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
  }

  .logo-text {
    font-size: 18px;
    font-weight: 700;
    color: rgba(255,255,255,0.7);
  }

  .footer-url {
    font-size: 16px;
    color: rgba(255,255,255,0.35);
  }
</style>
</head>
<body>

<div class="dots"></div>
<div class="glow"></div>

<div class="content">
  <div class="top-label">Özel pratik yapan bir psikolog için yıllık ortalama iptal kaybı</div>

  <div class="big-number">
    <span class="amount">₺57.600</span>
    <span class="sub">Çoğu zaman farkında bile olmadan.</span>
  </div>

  <div class="calc-card">
    <div class="calc-row">
      <span class="label">Ortalama seans ücreti</span>
      <span class="value">₺800</span>
    </div>
    <div class="calc-row">
      <span class="label">Ayda ortalama iptal</span>
      <span class="value">6 seans</span>
    </div>
    <div class="calc-row">
      <span class="label">Aylık kayıp</span>
      <span class="value">₺4.800</span>
    </div>
    <div class="calc-row total">
      <span class="label">Yıllık kayıp</span>
      <span class="value">₺57.600</span>
    </div>
  </div>

  <div class="bottom-note">
    <div class="dot"></div>
    <span>WhatsApp hatırlatıcı ile no-show oranı %70 azalır</span>
  </div>
</div>

<div class="footer">
  <div class="logo-row">
    <div class="logo-icon">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="4" width="18" height="18" rx="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/>
        <line x1="8" y1="2" x2="8" y2="6"/>
        <line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
    </div>
    <span class="logo-text">Seansify</span>
  </div>
  <span class="footer-url">seansify.com</span>
</div>


<!-- İndir butonu -->
<div style="position:fixed;bottom:24px;right:24px;z-index:999;">
  <button onclick="indir()" style="
    background:#4a7c6f;
    color:white;
    border:none;
    padding:14px 28px;
    border-radius:12px;
    font-size:15px;
    font-weight:700;
    cursor:pointer;
    box-shadow:0 4px 20px rgba(0,0,0,0.4);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    display:flex;align-items:center;gap:8px;
  ">
    ⬇ PNG İndir (1080×1080)
  </button>
</div>

<script>
function indir() {
  const btn = document.querySelector('button');
  btn.style.display = 'none';
  html2canvas(document.body, {
    width: 1080,
    height: 1080,
    scale: 1,
    useCORS: true,
    backgroundColor: null,
  }).then(canvas => {
    const link = document.createElement('a');
    link.download = 'seansify-iptal-kaybı.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
    btn.style.display = 'flex';
  });
}
</script>
</body>
</html>
